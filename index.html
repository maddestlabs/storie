<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storie - Interactive Terminal Stories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        #terminal-container {
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        #terminal {
            width: 100%;
            height: 100%;
        }

        /* Hide xterm scrollbar */
        .xterm-viewport {
            overflow-y: hidden !important;
        }

        .xterm-viewport::-webkit-scrollbar {
            display: none;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            font-size: 18px;
            z-index: 1000;
        }
        
        .hidden {
            display: none;
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f00;
            text-align: center;
            font-size: 16px;
            max-width: 80%;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Storie Engine...</div>
    <div id="error" class="hidden"></div>
    <div id="terminal-container" class="hidden">
        <div id="terminal"></div>
    </div>

    <!-- Load dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js"></script>
    
    <!-- Our main script -->
    <script src="storie.js"></script>
</body>
</html>
